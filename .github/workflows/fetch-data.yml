name: Robotnik Data Pipeline

on:
  schedule:
    - cron: '0 22 * * 1-5'   # Weekdays at 22:00 UTC — EOD pipeline (after US close)
    - cron: '0 5 * * 0'      # Sunday at 05:00 UTC — market caps refresh
    - cron: '0 23 * * 0'    # Sunday at 23:00 UTC — weekly health check
    - cron: '*/30 14-20 * * 1-5'  # US market hours: live prices every 30 min (14:00-20:30 UTC)
  workflow_dispatch:
    inputs:
      run_intel:
        description: 'Also run intel fetchers (news/research/filings/reports)?'
        type: boolean
        default: false

jobs:
  # ── Live prices (every 30 min during US market hours) ──
  live-prices:
    runs-on: ubuntu-latest
    if: github.event.schedule == '*/30 14-20 * * 1-5'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Fetch live prices (all entities + benchmarks)
        env:
          EODHD_API_KEY: ${{ secrets.EODHD_API_KEY }}
        run: python scripts/fetch_live_prices.py
      - name: Fetch intraday index (SOXX proxy)
        env:
          EODHD_API_KEY: ${{ secrets.EODHD_API_KEY }}
        run: python scripts/fetch_intraday_index.py
        continue-on-error: true
      - name: Commit live data
        run: |
          git config user.name "Robotnik Pipeline"
          git config user.email "data@robotniks.com"
          git add data/prices/live.json data/prices/intraday.json data/prices/intraday_index.json
          if git diff --cached --quiet; then
            echo "No live price changes"
          else
            git commit -m "data: live price update $(date -u +%Y-%m-%dT%H:%M)"
            git push
          fi

  # ── Full EOD pipeline (after US market close) ──
  fetch-prices:
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 22 * * 1-5' || github.event.schedule == '0 5 * * 0' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch prices (EODHD + CoinGecko)
        env:
          EODHD_API_KEY: ${{ secrets.EODHD_API_KEY }}
          COINGECKO_API_KEY: ${{ secrets.COINGECKO_API_KEY }}
        run: python scripts/fetch_prices.py

      - name: Fetch market caps (EODHD + CoinGecko)
        env:
          EODHD_API_KEY: ${{ secrets.EODHD_API_KEY }}
          COINGECKO_API_KEY: ${{ secrets.COINGECKO_API_KEY }}
        run: python scripts/fetch_market_caps.py

      - name: Refresh price history (incremental, merges with existing)
        env:
          EODHD_API_KEY: ${{ secrets.EODHD_API_KEY }}
          COINGECKO_API_KEY: ${{ secrets.COINGECKO_API_KEY }}
        # --refresh pulls the last 45 days per ticker and merges with the on-disk
        # 5-year series. This is what keeps "yesterday's close" in history. The
        # prior --backfill call was a no-op because every ticker already had a
        # file, which is what left history 11+ days stale.
        run: python scripts/fetch_price_history.py --refresh

      - name: Backfill any newly-added tickers (no-op when universe stable)
        env:
          EODHD_API_KEY: ${{ secrets.EODHD_API_KEY }}
          COINGECKO_API_KEY: ${{ secrets.COINGECKO_API_KEY }}
        run: python scripts/fetch_price_history.py --backfill

      - name: Fetch benchmark prices (SPY, QQQ, SOXX, ROBO)
        env:
          EODHD_API_KEY: ${{ secrets.EODHD_API_KEY }}
        run: python scripts/fetch_benchmarks.py

      - name: Calculate Robotnik Index
        run: python scripts/calculate_index.py

      - name: Fetch fundamentals (weekly — Mondays only)
        if: github.event.schedule == '0 6 * * 1' || github.event_name == 'workflow_dispatch'
        env:
          EODHD_API_KEY: ${{ secrets.EODHD_API_KEY }}
        run: python scripts/fetch_fundamentals.py

      - name: Fetch live prices (top 20 entities, 15-min delayed)
        env:
          EODHD_API_KEY: ${{ secrets.EODHD_API_KEY }}
        run: python scripts/fetch_live_prices.py
        continue-on-error: true

      - name: Fetch commodities prices
        env:
          EODHD_API_KEY: ${{ secrets.EODHD_API_KEY }}
        run: python scripts/fetch_commodities.py
        continue-on-error: true

      - name: Fetch earnings calendar (weekly — Mondays only)
        if: github.event.schedule == '0 6 * * 1' || github.event_name == 'workflow_dispatch'
        env:
          EODHD_API_KEY: ${{ secrets.EODHD_API_KEY }}
        run: python scripts/fetch_earnings_calendar.py
        continue-on-error: true

      - name: Calculate public markets metrics
        run: python scripts/calculate_metrics.py

      - name: Install dependencies for news
        run: pip install feedparser

      - name: Fetch news (RSS feeds — daily)
        run: python scripts/fetch_news.py
        continue-on-error: true

      - name: Commit price, index & news data
        run: |
          git config user.name "Robotnik Pipeline"
          git config user.email "data@robotniks.com"
          git add data/prices/ data/index/ data/markets/ data/news.json data/funding/
          if git diff --cached --quiet; then
            echo "No price/index/news changes — skipping commit"
          else
            git commit -m "data: daily price & index update $(date -u +%Y-%m-%d)"
            git push
          fi

  fetch-intel:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: >
      (github.event_name == 'schedule' && github.event.schedule == '0 6 * * 1-5')
      || (github.event_name == 'workflow_dispatch' && inputs.run_intel == true)
      && github.event.schedule != '0 5 * * 0'
    needs: fetch-prices

    steps:
      - name: Check if Monday
        if: github.event_name == 'schedule'
        run: |
          DAY=$(date -u +%u)
          if [ "$DAY" != "1" ]; then
            echo "Not Monday (day=$DAY) — skipping intel fetch"
            exit 0
          fi

      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch research papers (OpenAlex)
        run: python scripts/fetch_research.py

      - name: Fetch news (RSS feeds)
        run: python scripts/fetch_news.py

      - name: Fetch SEC filings (EDGAR)
        run: python scripts/fetch_filings.py

      - name: Fetch industry reports (IFR/SEMI/SIA)
        run: python scripts/fetch_reports.py
        continue-on-error: true

      - name: Commit intel data
        run: |
          git config user.name "Robotnik Pipeline"
          git config user.email "data@robotniks.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No intel changes — skipping commit"
          else
            git commit -m "data: weekly intel update $(date -u +%Y-%m-%d)"
            git push
          fi

  # ── Weekly health check (Sunday 23:00 UTC) ──
  health-check:
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 23 * * 0'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run quarantine health check
        run: python scripts/quarantine_health_check.py
      - name: Commit health report
        run: |
          git config user.name "Robotnik Pipeline"
          git config user.email "data@robotniks.com"
          git add data/quarantine/weekly_report.md
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "report: weekly quarantine health check $(date -u +%Y-%m-%d)"
            git push
          fi
