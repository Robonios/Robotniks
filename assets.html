<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Robotnik — Frontier Assets</title>
<meta name="description" content="Robotnik Frontier Assets — 253 public equities across the frontier technology stack.">
<link rel="icon" type="image/png" href="robotlogo.png">
<link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<style>
  /* Full-width layout override — no sidebar on assets page */
  .assets-full { max-width: 100%; padding: 0 1rem; }
  .assets-header { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:0.5rem; padding:0.75rem 0; }
  .assets-desc { font-size:10px; color:var(--text-dim); margin-top:2px; }

  /* Column group tabs */
  .col-group-tabs { display:flex; gap:2px; margin-bottom:0.5rem; }
  .col-group-tab { background:transparent; border:1px solid var(--border); color:var(--text-dim); font-family:var(--font);
    font-size:10px; padding:3px 10px; border-radius:3px; cursor:pointer; transition:all 0.15s; }
  .col-group-tab:hover { border-color:var(--text-dim); color:var(--text); }
  .col-group-tab.active { border-color:var(--yellow); color:var(--yellow); background:rgba(245,217,33,0.06); }

  /* Frozen-column table container */
  .assets-table-wrap { position:relative; overflow:hidden; border:1px solid var(--border); border-radius:4px; }
  .assets-table-scroll { overflow-x:auto; margin-left:0; }
  .assets-table { width:max-content; min-width:100%; border-collapse:collapse; font-size:11px; }
  .assets-table th, .assets-table td { padding:6px 8px; white-space:nowrap; border-bottom:1px solid var(--border); font-family:var(--font); }
  .assets-table th { position:sticky; top:0; background:var(--bg-card); color:var(--text-dim); font-size:10px; font-weight:500;
    text-transform:uppercase; letter-spacing:0.3px; cursor:pointer; user-select:none; z-index:2; }
  .assets-table th:hover { color:var(--text); }
  .assets-table td { color:var(--text); }
  .assets-table tr:hover td { background:var(--bg-hover); }
  .assets-table .r { text-align:right; }
  .assets-table .ticker-cell { font-weight:600; color:var(--yellow); }
  .assets-table .dim { color:var(--text-dim); font-size:9px; }
  .assets-table .v-green { color:var(--green); }
  .assets-table .v-red { color:var(--red); }

  /* Frozen first 3 columns */
  .assets-table th.frozen, .assets-table td.frozen { position:sticky; background:var(--bg-card); z-index:1; }
  .assets-table tr:hover td.frozen { background:var(--bg-hover); }
  .assets-table .f0 { left:0; min-width:30px; }
  .assets-table .f1 { left:30px; min-width:70px; }
  .assets-table .f2 { left:100px; min-width:140px; }
  .assets-table .f3 { left:240px; min-width:55px; }
  .assets-table .f4 { left:295px; min-width:90px; border-right:2px solid var(--border-light); }
  /* Shadow on frozen edge */
  .assets-table .f4::after { content:''; position:absolute; top:0; right:-6px; bottom:0; width:6px;
    background:linear-gradient(to right, rgba(0,0,0,0.15), transparent); pointer-events:none; }

  /* Sparkline */
  .spark { display:inline-block; vertical-align:middle; }
  .spark svg { display:block; }
</style>
</head>
<body data-page="assets">

<div class="bg-layer"></div>
<div id="nav-container"></div>

<div class="main-content">
<div class="assets-full">

  <!-- Header -->
  <div class="assets-header">
    <div>
      <div class="section-tag">Frontier Assets</div>
      <h2 style="font-size:clamp(1rem,2vw,1.3rem);font-weight:700;margin:0.25rem 0 0;">Public Market Universe</h2>
      <div class="assets-desc">253 frontier technology equities across semiconductors, robotics, space, and materials. Data from EODHD. Fundamentals weekly.</div>
    </div>
    <div style="font-size:11px;color:var(--text-dim);" id="assets-summary"></div>
  </div>

  <!-- Filters row -->
  <div style="display:flex;align-items:center;gap:0.75rem;flex-wrap:wrap;margin-bottom:0.5rem;">
    <div class="market-tabs" id="asset-tabs">
      <button class="market-tab active" data-sector="all" onclick="filterAssets(this)">All</button>
      <button class="market-tab" data-sector="semi" onclick="filterAssets(this)">Semi</button>
      <button class="market-tab" data-sector="robo" onclick="filterAssets(this)">Robotics</button>
      <button class="market-tab" data-sector="space" onclick="filterAssets(this)">Space</button>
      <button class="market-tab" data-sector="materials" onclick="filterAssets(this)">Materials</button>
    </div>
    <input type="text" id="asset-search" class="compare-search-input" placeholder="Search ticker or name..." oninput="renderAssetsTable()" style="width:180px;" />
    <button class="chart-range-btn" onclick="exportAssetsCSV()" style="margin-left:auto;" title="Download current view as CSV">Export &#8595;</button>
  </div>

  <!-- Column group tabs -->
  <div class="col-group-tabs" id="col-group-tabs">
    <button class="col-group-tab active" data-group="overview" onclick="setColGroup(this)">Overview</button>
    <button class="col-group-tab" data-group="performance" onclick="setColGroup(this)">Performance</button>
    <button class="col-group-tab" data-group="mcap" onclick="setColGroup(this)">Market Cap</button>
    <button class="col-group-tab" data-group="volume" onclick="setColGroup(this)">Volume</button>
    <button class="col-group-tab" data-group="valuation" onclick="setColGroup(this)">Valuation</button>
  </div>

  <!-- Table -->
  <div class="assets-table-wrap">
    <div class="assets-table-scroll">
      <table class="assets-table">
        <thead id="assets-thead"></thead>
        <tbody id="assets-tbody"></tbody>
      </table>
    </div>
  </div>

  <!-- Pagination -->
  <div style="padding:0.5rem 0;display:flex;align-items:center;justify-content:space-between;font-size:11px;color:var(--text-dim);">
    <span id="assets-showing">Showing 0</span>
    <div>
      <button class="chart-range-btn" id="assets-prev" onclick="assetsPage(-1)" style="margin-right:4px;">&lt; Prev</button>
      <span id="assets-page-info">Page 1</span>
      <button class="chart-range-btn" id="assets-next" onclick="assetsPage(1)" style="margin-left:4px;">Next &gt;</button>
    </div>
  </div>

</div><!-- assets-full -->

<footer>
  <p style="margin-bottom:0.5rem;">Robotnik &mdash; Mapping the frontier technology stack since re-entry.</p>
  <p style="font-size:0.65rem;"><a href="https://github.com/Robonios/Robotnik" target="_blank" rel="noopener" style="color:#5A6178;text-decoration:none;">GitHub</a></p>
  <p style="font-size:0.6rem;margin-top:0.3rem;">&copy; 2026 Robotnik</p>
</footer>
</div>

<script src="js/nav.js"></script>
<script src="js/assets.js"></script>
</body>
</html>
